{% extends "base.html" %}
{% block title %}Paziņojumi — Praulītis{% endblock %}

{% block content %}
<section class="section" style="padding-top:2rem">
  <div class="container" style="max-width:700px">
    <h1>Paziņojumi</h1>
    <div style="margin-top:1.5rem;display:flex;flex-direction:column;gap:1rem">
      {% for ann in items %}
      <div class="card card-body" {% if ann.is_pinned %}style="border-left:4px solid var(--amber)"{% endif %}>
        <div style="display:flex;justify-content:space-between;align-items:start;gap:.5rem">
          <h3 style="margin-bottom:.35rem">{% if ann.is_pinned %}📌 {% endif %}{{ ann.title }}</h3>
          <span style="font-size:.75rem;color:var(--ink-light);flex-shrink:0">{{ ann.created_at[:10] }}</span>
        </div>
        <p style="white-space:pre-line;margin:0;color:var(--ink-mid)">{{ ann.body }}</p>
      </div>
      {% else %}
      <p class="text-muted">Nav paziņojumu.</p>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
